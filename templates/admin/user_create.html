{% extends "base.html" %}

{% block title %}添加用户 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-plus-circle"></i> 添加用户</h2>
    <p class="text-muted">创建新的用户账户</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">用户名 <span class="text-danger">*</span></label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">密码 <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" required minlength="8">
                <small class="text-muted">至少8位</small>
            </div>
            <div class="col-md-6">
                <label class="form-label">所属团队</label>
                <input type="text" name="team_name" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">联系方式</label>
                <input type="text" name="contact_info" class="form-control">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff">
                    <label class="form-check-label" for="is_staff">
                        管理员权限（可访问用户管理）
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 创建
                </button>
                <a href="{% url 'admin_user_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
