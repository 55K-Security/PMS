{% extends "base.html" %}

{% block title %}修改密码 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-key"></i> 修改密码</h2>
    <p class="text-muted">更新您的登录密码</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <div class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle"></i> 修改密码后需要重新登录
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label">当前密码</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">新密码</label>
                <input type="password" name="new_password" class="form-control" required minlength="8">
                <small class="text-muted">至少8位，包含数字、大小写字母和特殊字符</small>
            </div>
            <div class="col-md-6">
                <label class="form-label">确认新密码</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 修改密码
                </button>
                <a href="{% url 'settings' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
