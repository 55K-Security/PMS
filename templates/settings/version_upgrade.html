{% extends "base.html" %}

{% block title %}系统版本升级 - 设置{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-arrow-down-circle"></i> 系统版本升级</h2>
    <p class="text-muted">上传补丁包与完整升级包，实现版本迭代与补丁更新</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label for="patch_file" class="form-label">系统补丁包</label>
                <input class="form-control" type="file" id="patch_file" name="patch_file" />
            </div>
            <div class="mb-3">
                <label for="upgrade_file" class="form-label">完整升级包</label>
                <input class="form-control" type="file" id="upgrade_file" name="upgrade_file" />
            </div>
            <button type="submit" class="btn btn-primary">上传并升级</button>
        </form>
    </div>
</div>

{% if uploaded %}
<div class="mt-3 alert alert-info" role="alert">
    已上传：{{ uploaded|join:", " }}
</div>
{% endif %}
{% endblock %}
