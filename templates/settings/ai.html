{% extends "base.html" %}

{% block title %}AI配置 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-cpu"></i> AI配置</h2>
    <p class="text-muted">配置AI服务用于自动生成周总结</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <h5 class="mb-3"><i class="bi bi-gear"></i> AI服务配置</h5>
            </div>
            <div class="col-md-12">
                <label class="form-label">AI服务URL</label>
                <input type="url" name="ai_url" class="form-control" value="{{ ai_url }}" placeholder="例如: https://api.openai.com/v1/chat/completions">
                <small class="text-muted">支持 OpenAI API 兼容接口</small>
            </div>
            <div class="col-md-12">
                <label class="form-label">API Key</label>
                <input type="password" name="ai_key" class="form-control" value="{{ ai_key }}" placeholder="请输入API Key">
                <small class="text-muted">API密钥将安全存储</small>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存配置
                </button>
                <a href="{% url 'settings' %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> 返回
                </a>
            </div>
        </form>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-lightbulb"></i> 使用说明</h5>
    </div>
    <div class="card-body">
        <ol>
            <li>配置AI服务URL和API Key</li>
            <li>在周计划页面生成总结时，系统会自动调用AI</li>
            <li>AI会根据周计划中的任务完成情况自动生成工作总结</li>
        </ol>
    </div>
</div>
{% endblock %}
