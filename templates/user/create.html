{% extends "base.html" %}

{% block title %}添加人员 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-person-plus"></i> 添加人员</h2>
    <p class="text-muted">添加新的项目成员</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">用户名 <span class="text-danger">*</span></label>
                <input type="text" name="user_name" class="form-control" placeholder="请输入姓名" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">所属团队</label>
                <input type="text" name="team_name" class="form-control" placeholder="例如：研发团队">
            </div>
            <div class="col-md-6">
                <label class="form-label">联系方式</label>
                <input type="text" name="contact_info" class="form-control" placeholder="电话或邮箱">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 添加
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
