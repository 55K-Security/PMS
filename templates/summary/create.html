{% extends "base.html" %}

{% block title %}新建周总结 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-plus-circle"></i> 新建周总结</h2>
    <p class="text-muted">总结本周工作并规划下周</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <label class="form-label">本周已完成工作</label>
                <textarea name="completed_work" class="form-control" rows="4" placeholder="记录本周完成的任务名称、完成时间、成果等"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">本周截止未完成工作</label>
                <textarea name="uncompleted_work" class="form-control" rows="4" placeholder="记录应完成但未完成的任务名称、未完成原因、计划完成时间"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">下周工作计划</label>
                <textarea name="next_week_plan" class="form-control" rows="4" placeholder="记录下周计划执行的任务名称、计划周期、预期成果"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">问题与建议</label>
                <textarea name="problems_suggestions" class="form-control" rows="3" placeholder="记录本周遇到的问题及改进建议"></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 提交总结
                </button>
                <a href="{% url 'summary_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
