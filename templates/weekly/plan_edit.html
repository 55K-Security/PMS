{% extends "base.html" %}

{% block title %}编辑周计划 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil-square"></i> 编辑周计划</h2>
    <p class="text-muted">修改本周的工作安排</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <h5 class="text-muted mb-3"><i class="bi bi-calendar3"></i> 每日任务安排</h5>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-danger me-1">周一</span> 任务
                </label>
                <textarea name="monday_task" class="form-control" rows="3" placeholder="请输入周一的工作任务">{{ plan.monday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-warning text-dark me-1">周二</span> 任务
                </label>
                <textarea name="tuesday_task" class="form-control" rows="3" placeholder="请输入周二的工作任务">{{ plan.tuesday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-info me-1">周三</span> 任务
                </label>
                <textarea name="wednesday_task" class="form-control" rows="3" placeholder="请输入周三的工作任务">{{ plan.wednesday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-primary me-1">周四</span> 任务
                </label>
                <textarea name="thursday_task" class="form-control" rows="3" placeholder="请输入周四的工作任务">{{ plan.thursday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-success me-1">周五</span> 任务
                </label>
                <textarea name="friday_task" class="form-control" rows="3" placeholder="请输入周五的工作任务">{{ plan.friday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-secondary me-1">周六</span> 任务
                </label>
                <textarea name="saturday_task" class="form-control" rows="3" placeholder="请输入周六的工作任务">{{ plan.saturday_task|default:'' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    <span class="badge bg-dark me-1">周日</span> 任务
                </label>
                <textarea name="sunday_task" class="form-control" rows="3" placeholder="请输入周日的工作任务">{{ plan.sunday_task|default:'' }}</textarea>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{% url 'weekly_plan_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
