{% extends "base.html" %}

{% block title %}编辑团队 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil-square"></i> 编辑团队</h2>
    <p class="text-muted">修改团队信息</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">团队名称 <span class="text-danger">*</span></label>
                <input type="text" name="team_name" class="form-control" value="{{ team.team_name }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">团队成员</label>
                <div class="row">
                    {% for user in users %}
                    <div class="col-md-3 col-sm-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="members" value="{{ user.user_id }}" id="user{{ user.user_id }}" 
                            {% if user in team.members.all %}checked{% endif %}>
                            <label class="form-check-label" for="user{{ user.user_id }}">
                                {{ user.user_name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="col-12">
                <label class="form-label">备注说明</label>
                <textarea name="remark" class="form-control" rows="2">{{ team.remark }}</textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
