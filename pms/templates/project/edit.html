{% extends "base.html" %}

{% block title %}编辑项目 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil"></i> 编辑项目</h2>
    <p class="text-muted">修改项目信息</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">项目名称 <span class="text-danger">*</span></label>
                <input type="text" name="project_name" class="form-control" value="{{ project.project_name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">项目负责人 <span class="text-danger">*</span></label>
                <select name="project_manager" class="form-select" required>
                    {% for manager in managers %}
                    <option value="{{ manager.user_id }}" {% if manager.user_id == project.project_manager.user_id %}selected{% endif %}>{{ manager.user_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">开始时间 <span class="text-danger">*</span></label>
                <input type="text" name="start_date" class="form-control date-picker" value="{{ project.start_date|date:'Y-m-d' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">结束时间 <span class="text-danger">*</span></label>
                <input type="text" name="end_date" class="form-control date-picker" value="{{ project.end_date|date:'Y-m-d' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">关键内容数量 <span class="text-danger">*</span></label>
                <input type="number" name="key_content_count" class="form-control" value="{{ project.key_content_count }}" min="0" required>
            </div>
            <div class="col-12">
                <label class="form-label">备注说明</label>
                <textarea name="remark" class="form-control" rows="3">{{ project.remark|default:'' }}</textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{% url 'project_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
