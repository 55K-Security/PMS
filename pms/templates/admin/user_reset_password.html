{% extends "base.html" %}

{% block title %}重置密码 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-key"></i> 重置密码</h2>
    <p class="text-muted">重置用户 {{ user.username }} 的密码</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <div class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle"></i> 您正在重置用户 <strong>{{ user.username }}</strong> 的密码
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label">新密码 <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" required minlength="8">
                <small class="text-muted">至少8位</small>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-check-circle"></i> 重置密码
                </button>
                <a href="{% url 'admin_user_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
