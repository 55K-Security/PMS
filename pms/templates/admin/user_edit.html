{% extends "base.html" %}

{% block title %}编辑用户 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil"></i> 编辑用户</h2>
    <p class="text-muted">修改用户信息</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">所属团队</label>
                <input type="text" name="team_name" class="form-control" value="{{ user_info_obj.team_name|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">联系方式</label>
                <input type="text" name="contact_info" class="form-control" value="{{ user_info_obj.contact_info|default:'' }}">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if user.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">
                        启用账户
                    </label>
                </div>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff" {% if user.is_staff %}checked{% endif %}>
                    <label class="form-check-label" for="is_staff">
                        管理员权限
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存
                </button>
                <a href="{% url 'admin_user_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
