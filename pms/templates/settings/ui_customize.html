{% extends 'base.html' %}
{% block title %}界面定制 - 设置{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-palette"></i> 界面定制</h2>
  <p class="text-muted">上传自定义登录背景与系统Logo，个性化界面风格</p>
</div>
<div class="card">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">登录背景图片</label>
        <input class="form-control" type="file" name="login_background">
      </div>
      <div class="mb-3">
        <label class="form-label">系统Logo</label>
        <input class="form-control" type="file" name="system_logo">
      </div>
      <button class="btn btn-primary" type="submit">保存设置</button>
    </form>
  </div>
</div>
{% if uploaded %}
<div class="mt-3 alert alert-info" role="alert">已上传：{{ uploaded|join:', ' }}</div>
{% endif %}
{% endblock %}
