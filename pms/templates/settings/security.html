{% extends "base.html" %}

{% block title %}安全设置 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-shield-lock"></i> 安全设置</h2>
    <p class="text-muted">配置账户安全选项</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-12">
                <h5 class="mb-3"><i class="bi bi-gear"></i> 安全选项</h5>
            </div>
            <div class="col-12">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="enable_captcha" id="enableCaptcha" {% if enable_captcha %}checked{% endif %}>
                    <label class="form-check-label" for="enableCaptcha">
                        <strong>启用验证码</strong>
                    </label>
                    <p class="text-muted small mb-0">登录时需要输入图形验证码</p>
                </div>
            </div>
            <div class="col-12">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="enable_2fa" id="enable2fa" {% if enable_2fa %}checked{% endif %}>
                    <label class="form-check-label" for="enable2fa">
                        <strong>启用双因素认证 (2FA)</strong>
                    </label>
                    <p class="text-muted small mb-0">登录时需要输入短信或邮箱验证码</p>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">会话超时时间</label>
                <select name="session_timeout" class="form-select">
                    <option value="15" {% if session_timeout == '15' %}selected{% endif %}>15分钟</option>
                    <option value="30" {% if session_timeout == '30' %}selected{% endif %}>30分钟</option>
                    <option value="60" {% if session_timeout == '60' %}selected{% endif %}>1小时</option>
                    <option value="120" {% if session_timeout == '120' %}selected{% endif %}>2小时</option>
                    <option value="0" {% if session_timeout == '0' %}selected{% endif %}>永不过期</option>
                </select>
                <small class="text-muted">无操作多久后自动退出登录</small>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存设置
                </button>
                <a href="{% url 'settings' %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> 返回
                </a>
            </div>
        </form>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-pc"></i> 关闭页面退出</h5>
    </div>
    <div class="card-body">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="closeLogoutToggle">
            <label class="form-check-label" for="closeLogoutToggle">
                <strong>关闭浏览器页面时自动退出登录</strong>
            </label>
        </div>
        <p class="text-muted small mt-2">启用后，关闭浏览器标签页或浏览器时将自动退出登录</p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var closeLogoutToggle = document.getElementById('closeLogoutToggle');
    var stored = localStorage.getItem('pms_close_logout');
    closeLogoutToggle.checked = (stored === 'true');
    
    closeLogoutToggle.addEventListener('change', function() {
        localStorage.setItem('pms_close_logout', this.checked ? 'true' : 'false');
        if (this.checked) {
            alert('已启用关闭页面退出功能');
        } else {
            alert('已关闭关闭页面退出功能');
        }
    });
});
</script>
{% endblock %}
