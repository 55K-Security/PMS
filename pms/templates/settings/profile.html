{% extends "base.html" %}

{% block title %}修改个人信息 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil"></i> 修改个人信息</h2>
    <p class="text-muted">更新您的个人资料</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                <small class="text-muted">用户名不可修改</small>
            </div>
            <div class="col-md-6">
                <label class="form-label">显示名称</label>
                <input type="text" name="user_name" class="form-control" value="{{ user_info.user_name|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">所属团队</label>
                <input type="text" name="team_name" class="form-control" value="{{ user_info.team_name|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">联系方式</label>
                <input type="text" name="contact_info" class="form-control" value="{{ user_info.contact_info|default:'' }}">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{% url 'settings' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
