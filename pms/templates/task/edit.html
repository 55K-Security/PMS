{% extends "base.html" %}

{% block title %}编辑任务 - 项目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil"></i> 编辑任务</h2>
    <p class="text-muted">修改任务信息与状态</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">任务ID</label>
                <input type="text" class="form-control" value="{{ task.task_id }}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">所属项目</label>
                <input type="text" class="form-control" value="{{ task.project.project_name }}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">关键内容名称 <span class="text-danger">*</span></label>
                <input type="text" name="key_content_name" class="form-control" value="{{ task.key_content_name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">紧急程度 <span class="text-danger">*</span></label>
                <select name="priority_level" class="form-select" required>
                    <option value="优先级1" {% if task.priority_level == '优先级1' %}selected{% endif %}>优先级1（最高）</option>
                    <option value="优先级2" {% if task.priority_level == '优先级2' %}selected{% endif %}>优先级2</option>
                    <option value="优先级3" {% if task.priority_level == '优先级3' %}selected{% endif %}>优先级3</option>
                    <option value="优先级4" {% if task.priority_level == '优先级4' %}selected{% endif %}>优先级4（最低）</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">任务负责人 <span class="text-danger">*</span></label>
                <select name="task_owner" class="form-select" required>
                    {% for u in owners %}
                    <option value="{{ u.user_id }}" {% if u.user_id == task.task_owner.user_id %}selected{% endif %}>{{ u.user_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">任务状态 <span class="text-danger">*</span></label>
                <select name="task_status" class="form-select" required>
                    <option value="未开始" {% if task.task_status == '未开始' %}selected{% endif %}>未开始</option>
                    <option value="进行中" {% if task.task_status == '进行中' %}selected{% endif %}>进行中</option>
                    <option value="已完成" {% if task.task_status == '已完成' %}selected{% endif %}>已完成</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">计划开始时间 <span class="text-danger">*</span></label>
                <input type="text" name="plan_start_date" class="form-control date-picker" value="{{ task.plan_start_date|date:'Y-m-d' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">计划结束时间 <span class="text-danger">*</span></label>
                <input type="text" name="plan_end_date" class="form-control date-picker" value="{{ task.plan_end_date|date:'Y-m-d' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">完成情况备注</label>
                <textarea name="completion_remark" class="form-control" rows="3" placeholder="记录任务执行中的问题、成果等">{{ task.completion_remark|default:'' }}</textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{% url 'task_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
